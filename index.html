<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDMX - Cyber Transit Network</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            background: #000;
            color: #0ff;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            font-family: 'Orbitron', sans-serif;
            z-index: 100;
            pointer-events: none;
        }
        
        .hud-title {
            font-size: 28px;
            font-weight: 900;
            color: #0ff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
            letter-spacing: 4px;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeIn 1s ease-out 3s forwards;
        }
        
        .hud-status {
            font-size: 14px;
            color: #0f8;
            text-shadow: 0 0 10px #0f8;
            opacity: 0;
            animation: fadeIn 1s ease-out 3.5s forwards;
        }
        
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #0ff, transparent);
            opacity: 0;
            animation: scanLine 2s linear infinite;
            z-index: 50;
        }
        
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            z-index: 75;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 255, 0.03) 0px,
                    transparent 1px,
                    transparent 2px,
                    rgba(0, 255, 255, 0.03) 3px
                );
        }
        
        .node-info {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 20, 30, 0.9);
            border: 2px solid #0ff;
            padding: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            opacity: 0;
            animation: fadeIn 1s ease-out 4s forwards;
            max-width: 300px;
        }
        
        .node-info h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            margin-bottom: 10px;
            color: #0f8;
            text-shadow: 0 0 10px #0f8;
        }
        
        .stat {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .stat-label {
            color: #0ff;
        }
        
        .stat-value {
            color: #0f8;
            font-weight: bold;
        }
        
        .download-app {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: linear-gradient(135deg, #0ff, #0a8);
            border: 2px solid #0ff;
            padding: 15px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #000;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.2);
            opacity: 0;
            animation: fadeIn 1s ease-out 4.5s forwards, pulse-glow 2s ease-in-out infinite;
            transition: all 0.3s ease;
            z-index: 100;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .download-app:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.3);
        }
        
        .download-app svg {
            width: 24px;
            height: 24px;
            fill: #000;
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.2);
            }
            50% {
                box-shadow: 0 0 50px rgba(0, 255, 255, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.3);
            }
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        @keyframes scanLine {
            0% { 
                top: 0; 
                opacity: 0;
            }
            50% { 
                opacity: 0.5;
            }
            100% { 
                top: 100%; 
                opacity: 0;
            }
        }
        
        .loading-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff;
            z-index: 200;
            opacity: 1;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="hud">
        <div class="hud-title">CDMX TRANSIT GRID</div>
        <div class="hud-status">SISTEMA ACTIVO // NODOS SINCRONIZADOS</div>
    </div>
    
    <div class="scan-line"></div>
    <div class="glitch-overlay"></div>
    
    <div class="node-info">
        <h3>RED METROBÚS</h3>
        <div class="stat">
            <span class="stat-label">LÍNEAS ACTIVAS:</span>
            <span class="stat-value">7</span>
        </div>
        <div class="stat">

        </div>
        <div class="stat">

        </div>
        <div class="stat">
            <span class="stat-label">ESTADO DEL SISTEMA:</span>
            <span class="stat-value">OPERATIVO</span>
        </div>
    </div>
    
    <a href="https://play.google.com/store/apps/details?id=com.angylabs.gogp" target="_blank" class="download-app">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.5,12.92 20.16,13.19L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
        </svg>
        Descargar App
    </a>
    
    <div class="loading-text" id="loadingText">INICIANDO PROTOCOLO DE ACCESO...</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Fase del sistema
        let phase = 'zoom'; // zoom -> hack -> transit
        let time = 0;
        let zoomLevel = 0;
        let hackProgress = 0;
        
        // Centro de CDMX
        const cdmxLat = 19.4326;
        const cdmxLng = -99.1332;
        
        // Rutas del Metrobús CDMX (basadas en datos reales 2026)
        const metrobusRoutes = [
            { // Línea 1: Indios Verdes - El Caminero (Color Guinda)
                name: 'Línea 1',
                color: '#b91d47',
                stations: [
                    {x: 0.48, y: 0.15}, {x: 0.47, y: 0.22}, {x: 0.46, y: 0.28},
                    {x: 0.46, y: 0.35}, {x: 0.47, y: 0.42}, {x: 0.48, y: 0.5},
                    {x: 0.49, y: 0.58}, {x: 0.50, y: 0.65}, {x: 0.51, y: 0.72},
                    {x: 0.52, y: 0.80}
                ]
            },
            { // Línea 2: Tepalcates - Tacubaya (Color Violeta)
                name: 'Línea 2',
                color: '#7d3f98',
                stations: [
                    {x: 0.25, y: 0.55}, {x: 0.32, y: 0.54}, {x: 0.39, y: 0.53},
                    {x: 0.45, y: 0.52}, {x: 0.52, y: 0.51}, {x: 0.58, y: 0.50},
                    {x: 0.65, y: 0.49}, {x: 0.72, y: 0.48}
                ]
            },
            { // Línea 3: Tenayuca - Etiopía (Color Naranja)
                name: 'Línea 3',
                color: '#f68b1f',
                stations: [
                    {x: 0.42, y: 0.18}, {x: 0.43, y: 0.26}, {x: 0.44, y: 0.34},
                    {x: 0.45, y: 0.42}, {x: 0.46, y: 0.50}, {x: 0.47, y: 0.58},
                    {x: 0.48, y: 0.66}
                ]
            },
            { // Línea 4: Buenavista - San Lázaro - Aeropuerto (Color Amarillo)
                name: 'Línea 4',
                color: '#fdd000',
                stations: [
                    {x: 0.42, y: 0.43}, {x: 0.46, y: 0.43}, {x: 0.50, y: 0.43},
                    {x: 0.54, y: 0.43}, {x: 0.58, y: 0.43}, {x: 0.62, y: 0.43},
                    {x: 0.68, y: 0.45}, {x: 0.75, y: 0.38}
                ]
            },
            { // Línea 5: Río de los Remedios - San Lázaro (Color Azul)
                name: 'Línea 5',
                color: '#0071bc',
                stations: [
                    {x: 0.58, y: 0.25}, {x: 0.57, y: 0.32}, {x: 0.56, y: 0.39},
                    {x: 0.55, y: 0.46}, {x: 0.54, y: 0.53}, {x: 0.53, y: 0.60},
                    {x: 0.52, y: 0.67}
                ]
            },
            { // Línea 6: El Rosario - Villa de Aragón (Color Rojo)
                name: 'Línea 6',
                color: '#e4002b',
                stations: [
                    {x: 0.35, y: 0.35}, {x: 0.40, y: 0.38}, {x: 0.45, y: 0.41},
                    {x: 0.50, y: 0.44}, {x: 0.55, y: 0.47}, {x: 0.60, y: 0.50},
                    {x: 0.65, y: 0.53}
                ]
            },
            { // Línea 7: Campo Marte - Indios Verdes (Color Verde)
                name: 'Línea 7',
                color: '#78c042',
                stations: [
                    {x: 0.46, y: 0.48}, {x: 0.46, y: 0.42}, {x: 0.46, y: 0.36},
                    {x: 0.46, y: 0.30}, {x: 0.47, y: 0.24}, {x: 0.48, y: 0.18}
                ]
            }
        ];
        
        // Unidades en movimiento
        const buses = [];
        metrobusRoutes.forEach((route, routeIdx) => {
            for (let i = 0; i < 3; i++) {
                buses.push({
                    route: routeIdx,
                    progress: Math.random(),
                    speed: 0.001 + Math.random() * 0.002,
                    color: route.color
                });
            }
        });
        
        // Nodos de hackeo
        const hackNodes = [];
        for (let i = 0; i < 50; i++) {
            hackNodes.push({
                x: Math.random(),
                y: Math.random(),
                size: Math.random() * 3 + 2,
                pulsePhase: Math.random() * Math.PI * 2,
                connections: []
            });
        }
        
        // Conectar nodos cercanos
        hackNodes.forEach((node, i) => {
            hackNodes.forEach((other, j) => {
                if (i !== j) {
                    const dist = Math.sqrt(
                        Math.pow(node.x - other.x, 2) + 
                        Math.pow(node.y - other.y, 2)
                    );
                    if (dist < 0.15) {
                        node.connections.push(j);
                    }
                }
            });
        });
        
        function drawStars() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                const alpha = Math.random() * 0.5 + 0.5;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawEarth() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const baseRadius = 150;
            const radius = baseRadius * (1 + zoomLevel * 3);
            
            // Planeta
            const gradient = ctx.createRadialGradient(
                centerX - radius * 0.3, centerY - radius * 0.3, 0,
                centerX, centerY, radius
            );
            gradient.addColorStop(0, '#0a4d68');
            gradient.addColorStop(0.5, '#053742');
            gradient.addColorStop(1, '#001a23');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Glow
            ctx.strokeStyle = 'rgba(0, 150, 255, 0.3)';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 5, 0, Math.PI * 2);
            ctx.stroke();
            
            // Marca de CDMX
            if (zoomLevel > 0.3) {
                const targetX = centerX + Math.cos(0.2) * radius * 0.3;
                const targetY = centerY + Math.sin(0.2) * radius * 0.3;
                
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#0ff';
                ctx.beginPath();
                ctx.arc(targetX, targetY, 10 * zoomLevel, 0, Math.PI * 2);
                ctx.stroke();
                
                // Líneas de targeting
                ctx.beginPath();
                ctx.moveTo(targetX - 20, targetY);
                ctx.lineTo(targetX - 10, targetY);
                ctx.moveTo(targetX + 10, targetY);
                ctx.lineTo(targetX + 20, targetY);
                ctx.moveTo(targetX, targetY - 20);
                ctx.lineTo(targetX, targetY - 10);
                ctx.moveTo(targetX, targetY + 10);
                ctx.lineTo(targetX, targetY + 20);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }
        
        function drawHackGrid() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid hexagonal
            const hexSize = 30;
            const rows = Math.ceil(canvas.height / (hexSize * 1.5)) + 1;
            const cols = Math.ceil(canvas.width / (hexSize * Math.sqrt(3))) + 1;
            
            ctx.strokeStyle = `rgba(0, 255, 255, ${hackProgress * 0.3})`;
            ctx.lineWidth = 1;
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const x = col * hexSize * Math.sqrt(3) + (row % 2) * hexSize * Math.sqrt(3) / 2;
                    const y = row * hexSize * 1.5;
                    
                    drawHexagon(x, y, hexSize * hackProgress);
                }
            }
            
            // Nodos
            hackNodes.forEach((node, i) => {
                const x = node.x * canvas.width;
                const y = node.y * canvas.height;
                const pulse = Math.sin(time * 0.003 + node.pulsePhase) * 0.5 + 0.5;
                const alpha = hackProgress * (0.5 + pulse * 0.5);
                
                // Conexiones
                node.connections.forEach(targetIdx => {
                    const target = hackNodes[targetIdx];
                    const tx = target.x * canvas.width;
                    const ty = target.y * canvas.height;
                    
                    ctx.strokeStyle = `rgba(0, 255, 255, ${alpha * 0.3})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(tx, ty);
                    ctx.stroke();
                });
                
                // Nodo
                ctx.fillStyle = `rgba(0, 255, 255, ${alpha})`;
                ctx.shadowBlur = 15 * hackProgress;
                ctx.shadowColor = '#0ff';
                ctx.beginPath();
                ctx.arc(x, y, node.size * hackProgress, 0, Math.PI * 2);
                ctx.fill();
                
                // Anillo exterior
                ctx.strokeStyle = `rgba(0, 255, 255, ${alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x, y, (node.size + 5 * pulse) * hackProgress, 0, Math.PI * 2);
                ctx.stroke();
            });
            
            ctx.shadowBlur = 0;
        }
        
        function drawHexagon(x, y, size) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i;
                const hx = x + size * Math.cos(angle);
                const hy = y + size * Math.sin(angle);
                if (i === 0) {
                    ctx.moveTo(hx, hy);
                } else {
                    ctx.lineTo(hx, hy);
                }
            }
            ctx.closePath();
            ctx.stroke();
        }
        
        function drawTransitNetwork() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid de fondo sutil
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // Rutas del Metrobús
            metrobusRoutes.forEach(route => {
                // Línea de la ruta con glow
                ctx.strokeStyle = route.color;
                ctx.lineWidth = 4;
                ctx.shadowBlur = 20;
                ctx.shadowColor = route.color;
                ctx.globalAlpha = 0.6;
                
                ctx.beginPath();
                route.stations.forEach((station, idx) => {
                    const x = station.x * canvas.width;
                    const y = station.y * canvas.height;
                    if (idx === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();
                
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                
                // Etiqueta de la línea (en la primera estación)
                const firstStation = route.stations[0];
                const labelX = firstStation.x * canvas.width;
                const labelY = firstStation.y * canvas.height - 20;
                
                ctx.fillStyle = route.color;
                ctx.font = 'bold 12px Orbitron';
                ctx.shadowBlur = 10;
                ctx.shadowColor = route.color;
                ctx.fillText(route.name, labelX - 25, labelY);
                ctx.shadowBlur = 0;
                
                // Estaciones
                route.stations.forEach(station => {
                    const x = station.x * canvas.width;
                    const y = station.y * canvas.height;
                    
                    // Círculo exterior
                    ctx.strokeStyle = route.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(x, y, 8, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    // Círculo interior
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Pulso
                    const pulse = Math.sin(time * 0.005) * 0.3 + 0.7;
                    ctx.strokeStyle = route.color;
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = pulse * 0.5;
                    ctx.beginPath();
                    ctx.arc(x, y, 12 + pulse * 5, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                });
            });
            
            // Buses en movimiento
            buses.forEach(bus => {
                bus.progress += bus.speed;
                if (bus.progress > 1) bus.progress = 0;
                
                const route = metrobusRoutes[bus.route];
                const stations = route.stations;
                const segmentCount = stations.length - 1;
                const currentSegment = Math.floor(bus.progress * segmentCount);
                const segmentProgress = (bus.progress * segmentCount) % 1;
                
                if (currentSegment < segmentCount) {
                    const start = stations[currentSegment];
                    const end = stations[currentSegment + 1];
                    
                    const x = (start.x + (end.x - start.x) * segmentProgress) * canvas.width;
                    const y = (start.y + (end.y - start.y) * segmentProgress) * canvas.height;
                    
                    // Trail estilo TRON
                    ctx.strokeStyle = bus.color;
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = bus.color;
                    
                    const trailLength = 30;
                    const angle = Math.atan2(end.y - start.y, end.x - start.x);
                    
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(
                        x - Math.cos(angle) * trailLength,
                        y - Math.sin(angle) * trailLength
                    );
                    ctx.stroke();
                    
                    // Bus (punto brillante)
                    ctx.fillStyle = bus.color;
                    ctx.shadowBlur = 25;
                    ctx.beginPath();
                    ctx.arc(x, y, 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Anillo exterior
                    ctx.strokeStyle = bus.color;
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 30;
                    ctx.globalAlpha = 0.7;
                    ctx.beginPath();
                    ctx.arc(x, y, 10, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                    ctx.shadowBlur = 0;
                }
            });
        }
        
        function animate() {
            time++;
            
            if (phase === 'zoom') {
                drawStars();
                drawEarth();
                
                zoomLevel += 0.005;
                
                if (zoomLevel >= 1) {
                    phase = 'hack';
                    zoomLevel = 1;
                    document.getElementById('loadingText').textContent = 'ACCEDIENDO A LA RED...';
                }
            } else if (phase === 'hack') {
                drawHackGrid();
                
                hackProgress += 0.01;
                
                if (hackProgress >= 1) {
                    phase = 'transit';
                    hackProgress = 1;
                    document.getElementById('loadingText').style.display = 'none';
                    document.querySelector('.scan-line').style.opacity = '1';
                    document.querySelector('.glitch-overlay').style.opacity = '1';
                }
            } else if (phase === 'transit') {
                drawTransitNetwork();
            }
            
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        animate();
    </script>
</body>
</html>
