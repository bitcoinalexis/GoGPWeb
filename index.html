<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoGP</title>
  <meta name="description" content="GoGP - Visualiza rutas de transporte en tiempo real" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 40px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    a.button {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 12px;
      background: white;
      color: #0f172a;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
    }
    a.button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GoGP</h1>
    <p>Consulta rutas y transporte en tiempo real desde tu celular.</p>
    <a class="button" href="https://play.google.com/store/apps/details?id=com.angylabs.gogp" target="_blank">
      Descargar en Google Play
    </a>
  </div>
</body>
</html>
