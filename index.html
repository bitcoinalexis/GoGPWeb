<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoGP — Metrobús CDMX en Tiempo Real</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #070b18;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      overflow: hidden;
      height: 100dvh;
      color: #fff;
    }

    #c {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Vignette suave para que el contenido destaque */
    #vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(
        ellipse 70% 70% at 50% 50%,
        transparent 30%,
        rgba(7, 11, 24, 0.55) 80%,
        rgba(7, 11, 24, 0.85) 100%
      );
      pointer-events: none;
    }

    #ui {
      position: relative;
      z-index: 10;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      text-align: center;
      gap: 0;
    }

    /* Badge icono */
    .app-icon {
      width: 88px;
      height: 88px;
      background: linear-gradient(145deg, #FF6400, #FF9A40);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      margin-bottom: 22px;
      box-shadow:
        0 0 0 1px rgba(255,100,0,0.3),
        0 8px 32px rgba(255,100,0,0.45),
        0 2px 8px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: clamp(3.2rem, 12vw, 6.5rem);
      font-weight: 900;
      letter-spacing: -3px;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 25%, #FF9040 65%, #FF6400);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .tagline {
      font-size: clamp(0.95rem, 2.8vw, 1.2rem);
      color: rgba(255, 255, 255, 0.55);
      max-width: 440px;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .features {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 36px;
      max-width: 480px;
    }

    .pill {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      padding: 5px 15px;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.01em;
      backdrop-filter: blur(8px);
    }

    /* Botón Google Play */
    .gplay-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      background: #fff;
      color: #111;
      border-radius: 14px;
      padding: 14px 26px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.45), 0 1px 4px rgba(0,0,0,0.3);
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
      user-select: none;
    }
    .gplay-btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 14px 40px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.3);
    }
    .gplay-btn:active { transform: translateY(0) scale(0.98); }

    .gplay-icon { width: 30px; height: 30px; flex-shrink: 0; }

    .gplay-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.2; }
    .gplay-small { font-size: 0.68rem; color: #555; font-weight: 400; }
    .gplay-big   { font-size: 1.05rem; font-weight: 700; color: #111; }

    .sub {
      margin-top: 14px;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.22);
      letter-spacing: 0.05em;
    }

    /* Branding inferior */
    .footer {
      position: fixed;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.15);
      z-index: 10;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .app-icon { width: 72px; height: 72px; font-size: 36px; border-radius: 18px; margin-bottom: 16px; }
      .features { gap: 6px; margin-bottom: 28px; }
      .gplay-btn { padding: 12px 20px; border-radius: 12px; }
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="vignette"></div>

<div id="ui">
  <div class="app-icon">🚌</div>

  <h1>GoGP</h1>

  <p class="tagline">
    Rastrea las unidades del Metrobús CDMX en tiempo real.<br>
    7 líneas, GPS en vivo, directo en tu teléfono.
  </p>

  <div class="features">
    <span class="pill">🗺 Mapa en vivo</span>
    <span class="pill">📍 7 Líneas</span>
    <span class="pill">⚡ Tiempo real</span>
    <span class="pill">🔔 Notificaciones</span>
    <span class="pill">🌙 Modo oscuro</span>
  </div>

  <a href="https://play.google.com/store/apps/details?id=com.angylabs.gogp"
     target="_blank" rel="noopener noreferrer" class="gplay-btn">

    <!-- Google Play icon SVG -->
    <svg class="gplay-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="7.16" y1="8.49" x2="24.78" y2="26.11" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#00a0ff"/>
          <stop offset=".01" stop-color="#00a1ff"/>
          <stop offset=".26" stop-color="#00beff"/>
          <stop offset=".51" stop-color="#00d2ff"/>
          <stop offset=".76" stop-color="#00dfff"/>
          <stop offset="1" stop-color="#00e3ff"/>
        </linearGradient>
        <linearGradient id="g2" x1="33.83" y1="24" x2="4.45" y2="24" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#ffe000"/>
          <stop offset=".41" stop-color="#ffbd00"/>
          <stop offset=".78" stop-color="orange"/>
          <stop offset="1" stop-color="#ff9c00"/>
        </linearGradient>
        <linearGradient id="g3" x1="27.08" y1="22.4" x2="2.07" y2="-2.61" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#ff3a44"/>
          <stop offset="1" stop-color="#c31162"/>
        </linearGradient>
        <linearGradient id="g4" x1="1.54" y1="37.11" x2="17.56" y2="21.1" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#32a071"/>
          <stop offset=".07" stop-color="#2da771"/>
          <stop offset=".48" stop-color="#15cf74"/>
          <stop offset=".8" stop-color="#06e775"/>
          <stop offset="1" stop-color="#00f076"/>
        </linearGradient>
      </defs>
      <path d="M7.43 4.72A3.27 3.27 0 0 0 6 7.43v33.14a3.27 3.27 0 0 0 1.43 2.71l.14.09 18.57-18.57v-.44L7.57 4.63z" fill="url(#g1)"/>
      <path d="m32.32 31.06-6.18-6.19v-.44l6.19-6.19.14.08 7.33 4.16c2.09 1.19 2.09 3.13 0 4.32l-7.33 4.17z" fill="url(#g2)"/>
      <path d="M32.46 30.98 26.14 24.6 7.43 43.28c.69.73 1.82.82 3.09.09z" fill="url(#g3)"/>
      <path d="M32.46 17.02 10.52 4.63c-1.27-.73-2.4-.64-3.09.09L26.14 23.4z" fill="url(#g4)"/>
    </svg>

    <div class="gplay-text">
      <span class="gplay-small">Disponible en</span>
      <span class="gplay-big">Google Play</span>
    </div>
  </a>

  <p class="sub">Android · Gratis</p>
</div>

<div class="footer">© 2025 AngylAbs · GoGP</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
"use strict";
(function () {

  const canvas = document.getElementById("c");
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(W(), H());
  renderer.setClearColor(0x070b18);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x070b18, 0.011);

  const camera = new THREE.PerspectiveCamera(52, W() / H(), 0.1, 600);
  camera.position.set(0, 52, 62);
  camera.lookAt(0, 0, 0);

  window.addEventListener("resize", () => {
    renderer.setSize(W(), H());
    camera.aspect = W() / H();
    camera.updateProjectionMatrix();
  });

  // ── Textura de glow (círculo difuso) ──────────────────────────────
  function glowTex(r, g, b) {
    const sz = 128;
    const cv = document.createElement("canvas");
    cv.width = cv.height = sz;
    const ctx = cv.getContext("2d");
    const gr = ctx.createRadialGradient(sz / 2, sz / 2, 0, sz / 2, sz / 2, sz / 2);
    gr.addColorStop(0,    `rgba(${r},${g},${b},1)`);
    gr.addColorStop(0.35, `rgba(${r},${g},${b},0.55)`);
    gr.addColorStop(0.7,  `rgba(${r},${g},${b},0.15)`);
    gr.addColorStop(1,    `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = gr;
    ctx.fillRect(0, 0, sz, sz);
    return new THREE.CanvasTexture(cv);
  }

  // ── Grid ciudad ───────────────────────────────────────────────────
  {
    const S = 90, D = 22, step = S / D, half = S / 2;
    const pts = [];
    for (let i = 0; i <= D; i++) {
      const z = -half + i * step;
      pts.push(-half, 0, z, half, 0, z);
    }
    for (let i = 0; i <= D; i++) {
      const x = -half + i * step;
      pts.push(x, 0, -half, x, 0, half);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.Float32BufferAttribute(pts, 3));
    scene.add(new THREE.LineSegments(geo, new THREE.LineBasicMaterial({
      color: 0x0c1f3f, transparent: true, opacity: 0.75
    })));
  }

  // ── Estrellas ─────────────────────────────────────────────────────
  {
    const N = 1800;
    const pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      pos[i * 3]     = (Math.random() - 0.5) * 400;
      pos[i * 3 + 1] = 15 + Math.random() * 120;
      pos[i * 3 + 2] = (Math.random() - 0.5) * 400;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
      color: 0xffffff, size: 0.28, transparent: true, opacity: 0.55,
      sizeAttenuation: true
    })));
  }

  // ── Definición de rutas Metrobús (colores oficiales) ──────────────
  // Coordenadas en espacio 3D (x, z) representando el trazado
  const ROUTES = [
    // Línea 1 — Rojo
    { rgb: [212, 13, 13],
      pts: [[-38,14],[-28,9],[-16,4],[-4,0],[10,-5],[22,-9],[38,-14]] },
    // Línea 2 — Azul
    { rgb: [26, 95, 172],
      pts: [[-34,-19],[-22,-13],[-8,-7],[4,-2],[16,3],[30,8]] },
    // Línea 3 — Dorado
    { rgb: [196, 146, 42],
      pts: [[-24,30],[-14,20],[-4,10],[6,-2],[18,-14]] },
    // Línea 4 — Naranja
    { rgb: [255, 102, 0],
      pts: [[-5,-28],[4,-17],[10,-7],[16,3],[22,13]] },
    // Línea 5 — Rojo oscuro
    { rgb: [140, 0, 0],
      pts: [[-38,5],[-24,1],[-10,-3],[6,-7],[22,-13],[38,-20]] },
    // Línea 6 — Ámbar
    { rgb: [255, 160, 0],
      pts: [[30,-28],[20,-17],[10,-7],[0,3],[-12,14],[-26,25]] },
    // Línea 7 — Morado
    { rgb: [123, 31, 162],
      pts: [[-9,34],[-4,24],[1,14],[6,4],[12,-8],[18,-22]] },
  ];

  const routeData = ROUTES.map(def => {
    const [r, g, b] = def.rgb;
    const color = `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, "0")}`;
    const tex = glowTex(r, g, b);

    const curvePts = def.pts.map(([x, z]) => new THREE.Vector3(x, 0.1, z));
    const curve = new THREE.CatmullRomCurve3(curvePts);
    const samples = curve.getPoints(250);

    // Línea central (core)
    const lineGeo = new THREE.BufferGeometry().setFromPoints(samples);
    scene.add(new THREE.Line(lineGeo, new THREE.LineBasicMaterial({
      color, transparent: true, opacity: 0.9,
      blending: THREE.AdditiveBlending
    })));

    // Halo de glow (partículas a lo largo de la ruta)
    const haloPos = new Float32Array(samples.length * 3);
    samples.forEach((p, i) => {
      haloPos[i * 3]     = p.x;
      haloPos[i * 3 + 1] = p.y + 0.08;
      haloPos[i * 3 + 2] = p.z;
    });
    const haloGeo = new THREE.BufferGeometry();
    haloGeo.setAttribute("position", new THREE.BufferAttribute(haloPos, 3));
    scene.add(new THREE.Points(haloGeo, new THREE.PointsMaterial({
      color, size: 0.55, map: tex,
      transparent: true, opacity: 0.3,
      blending: THREE.AdditiveBlending, depthWrite: false,
      sizeAttenuation: true
    })));

    // Buses (puntos brillantes que se mueven)
    const nBuses = 2 + Math.floor(Math.random() * 3);
    const buses = Array.from({ length: nBuses }, (_, i) => ({
      t:     i / nBuses,
      speed: 0.00055 + Math.random() * 0.00045
    }));

    const busPos = new Float32Array(nBuses * 3);
    const busGeo = new THREE.BufferGeometry();
    busGeo.setAttribute("position", new THREE.BufferAttribute(busPos, 3));
    scene.add(new THREE.Points(busGeo, new THREE.PointsMaterial({
      color, size: 2.2, map: tex,
      transparent: true, opacity: 1.0,
      blending: THREE.AdditiveBlending, depthWrite: false,
      sizeAttenuation: true
    })));

    return { curve, buses, busGeo, busPos };
  });

  // ── Parallax del mouse ────────────────────────────────────────────
  let mx = 0, my = 0;
  document.addEventListener("mousemove", e => {
    mx = (e.clientX / W() - 0.5) * 2;
    my = (e.clientY / H() - 0.5) * 2;
  });

  // ── Loop de animación ─────────────────────────────────────────────
  let tick = 0;

  function animate() {
    requestAnimationFrame(animate);
    tick += 0.001;

    // Órbita lenta + parallax del mouse
    const targetX = Math.sin(tick * 0.25) * 14 + mx * 6;
    const targetZ = 62 + Math.cos(tick * 0.18) * 10 + my * 4;
    camera.position.x += (targetX - camera.position.x) * 0.03;
    camera.position.z += (targetZ - camera.position.z) * 0.03;
    camera.lookAt(0, 0, 0);

    // Mover buses
    routeData.forEach(rd => {
      rd.buses.forEach((bus, i) => {
        bus.t = (bus.t + bus.speed) % 1;
        const p = rd.curve.getPoint(bus.t);
        rd.busPos[i * 3]     = p.x;
        rd.busPos[i * 3 + 1] = p.y + 0.4;
        rd.busPos[i * 3 + 2] = p.z;
      });
      rd.busGeo.attributes.position.needsUpdate = true;
    });

    renderer.render(scene, camera);
  }

  animate();

})();
</script>
</body>
</html>
